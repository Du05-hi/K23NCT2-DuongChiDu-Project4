<!DOCTYPE html>
<html lang="vi">
    
<head>
    <meta charset="UTF-8">
    <title>Làm bài | DHTA ACADEMY</title>

    <link rel="stylesheet" href="../../CSS/main.css">
    <link rel="stylesheet" href="../../CSS/exam.css">
    <style>
        /* CSS bổ trợ hiển thị câu hỏi và kết quả đồng bộ giao diện */
        .exam-header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .student-tag {
            color: #00d2ff;
            font-size: 15px;
            font-weight: bold;
        }
        .quiz-question-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }
        .quiz-question-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #fff;
        }
        .quiz-options-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .quiz-option-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .quiz-option-item:hover {
            background: rgba(0, 210, 255, 0.08);
            border-color: #00d2ff;
        }
        .quiz-option-item input {
            accent-color: #00d2ff;
            cursor: pointer;
        }
        #result-box {
            margin-top: 30px;
            padding: 25px;
            background: rgba(0, 210, 255, 0.05);
            border: 2px solid #00d2ff;
            border-radius: 15px;
            text-align: center;
        }
        #result-box h3 { font-size: 24px; color: #ff00ea; margin-bottom: 10px; }
        #result-box p { font-size: 18px; color: #fff; }
    </style>
</head>

<body>
<div id="confirmModal" class="confirm-modal">
    <div class="confirm-box">
        <h3>⚠️ Thoát bài thi?</h3>
        <p>Bạn có chắc muốn thoát? Tiến trình sẽ mất.</p>

        <div class="confirm-actions">
            <button class="btn-cancel" onclick="closeConfirm()">Hủy</button>
            <button class="btn-ok" onclick="confirmExit()">Thoát</button>
        </div>
    </div>
</div>

<div class="exam-container">
    <div class="exam-header-info">
        <button class="btn-back" onclick="goBack()">⬅ Quay lại</button>
        <div class="student-tag" id="student-info-display">
            Học viên: <span id="student-username-text" style="color:#fff;">Chưa đăng nhập</span> 
            <span style="margin: 0 10px; color: rgba(255,255,255,0.2);">|</span>
            Mã số: <span id="student-id-text" style="color:#fff;">N/A</span>
        </div>
        <div class="timer">⏱️ Thời gian: <span id="time">00:00</span></div>
    </div>

    <div class="progress-bar">
        <div id="progress"></div>
    </div>

    <h2 id="exam-main-title">Làm bài tập</h2>

    <div id="quiz"></div>

    <button id="btn-submit-quiz" onclick="submitQuiz()" style="margin-top: 20px;">Nộp bài</button>

    <div id="result"></div>
</div>

<script>
    const API_URL = "http://127.0.0.1:5001/api";
    let currentQuestions = [];
    let countdownTimer = null;
    let totalSeconds = 0;
    let initialSeconds = 0;
    let quizIdFromUrl = null; 

    // 1. ĐỒNG BỘ PHIÊN ĐĂNG NHẬP HỌC VIÊN TỪ LOCALSTORAGE
    function syncUserSession() {
        const studentUser = JSON.parse(localStorage.getItem('user'));
        if (studentUser) {
            document.getElementById('student-username-text').innerText = studentUser.username;
            document.getElementById('student-id-text').innerText = `#${studentUser.id}`;
        } else {
            document.getElementById('student-info-display').innerHTML = `<span style="color:#ff4d6d; font-weight:bold;">⚠️ Bạn chưa đăng nhập tài khoản học viên!</span>`;
        }
    }

    // 2. TẢI ĐỀ THI VÀ XỬ LÝ PARSE TOÀN DIỆN DIỆN DỮ LIỆU CÂU HỎI
    async function loadQuizData() {
        syncUserSession();

        const urlParams = new URLSearchParams(window.location.search);
        quizIdFromUrl = urlParams.get('id');

        if (!quizIdFromUrl) {
            alert("Không tìm thấy ID bài luyện tập!");
            window.location.href = 'training.html';
            return;
        }

        try {
            const response = await fetch(`${API_URL}/quiz/${quizIdFromUrl}`);
            if (!response.ok) {
                document.getElementById('quiz').innerHTML = `<p style="color: #ff4d6d; text-align:center; font-size:18px;">❌ Không tìm thấy dữ liệu bài tập trong hệ thống!</p>`;
                document.getElementById('btn-submit-quiz').style.display = 'none';
                return;
            }

            const quizData = await response.json();
            document.getElementById('exam-main-title').innerText = quizData.title;
            
            // XỬ LÝ ÉP KIỂU TOÀN DIỆN CHO MỌI PHÂN HỆ CƠ SỞ DỮ LIỆU
            currentQuestions = [];
            if (quizData.questions && Array.isArray(quizData.questions)) {
                quizData.questions.forEach(item => {
                    let parsedObj = null;

                    // Trường hợp 1: Phần tử là chuỗi JSON thô hoàn toàn
                    if (typeof item === 'string') {
                        try { parsedObj = JSON.parse(item); } catch(e) { parsedObj = null; }
                    }
                    // Trường hợp 2: Là đối tượng chứa trường .content dạng chuỗi (Mới thêm vào DB)
                    else if (item && item.content && typeof item.content === 'string') {
                        try { parsedObj = JSON.parse(item.content); } catch(e) { parsedObj = null; }
                    }
                    // Trường hợp 3: Là đối tượng đã chuẩn hóa sẵn cấu trúc từ trước
                    else if (item && (item.q || item.question)) {
                        parsedObj = item;
                    }

                    if (parsedObj) {
                        // Đồng bộ giữ lại trường point gốc nếu vật thể con thiếu mất thuộc tính điểm
                        if (!parsedObj.point && item.point) {
                            parsedObj.point = item.point;
                        }
                        currentQuestions.push(parsedObj);
                    }
                });
            }
            
            totalSeconds = quizData.duration * 60;
            initialSeconds = totalSeconds;
            
            startTimer();
            renderQuestions();

        } catch (error) {
            console.error("Lỗi tải đề thi:", error);
            document.getElementById('quiz').innerHTML = `<p style="color: #ff4d6d; text-align:center;">Lỗi kết nối Server Backend!</p>`;
        }
    }

    // 3. ĐỔ DỮ LIỆU CÂU HỎI RA MÀN HÌNH CHUẨN ĐÉT
    function renderQuestions() {
        const quizContainer = document.getElementById('quiz');
        if (currentQuestions.length === 0) {
            quizContainer.innerHTML = "<p style='text-align:center;'>Bài luyện tập này hiện chưa có câu hỏi.</p>";
            return;
        }

        quizContainer.innerHTML = currentQuestions.map((qData, qIdx) => {
            const questionText = qData.q || qData.question || "Nội dung câu hỏi không xác định";
            const optionsList = qData.options || [];

            if (optionsList.length === 0) return ''; 

            const optionsHtml = optionsList.map((optText, oIdx) => `
                <li>
                    <label class="quiz-option-item">
                        <input type="radio" name="question-${qIdx}" value="${oIdx}">
                        <span>${optText}</span>
                    </label>
                </li>
            `).join('');

            return `
                <div class="quiz-question-box">
                    <div class="quiz-question-title">Câu ${qIdx + 1}: ${questionText} <span style="color:#00d2ff; font-size:14px;">(${qData.point || 2}đ)</span></div>
                    <ul class="quiz-options-list">
                        ${optionsHtml}
                    </ul>
                </div>
            `;
        }).join('');
    }

    // 4. ĐỒNG HỒ ĐẾM NGƯỢC THỜI GIAN LÀM BÀI
    function startTimer() {
        const timeDisplay = document.getElementById('time');
        const progressBar = document.getElementById('progress');

        countdownTimer = setInterval(() => {
            if (totalSeconds <= 0) {
                clearInterval(countdownTimer);
                timeDisplay.innerText = "00:00";
                progressBar.style.width = "100%";
                alert("⏰ Đã hết thời gian làm bài! Hệ thống tự động nộp bài.");
                submitQuiz();
                return;
            }

            totalSeconds--;
            
            const mins = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const secs = (totalSeconds % 60).toString().padStart(2, '0');
            timeDisplay.innerText = `${mins}:${secs}`;

            const progressPercent = ((initialSeconds - totalSeconds) / initialSeconds) * 100;
            progressBar.style.width = `${progressPercent}%`;

        }, 1000);
    }

    // 5. TÍNH TOÁN ĐIỂM SỐ VÀ BẮN API LƯU KẾT QUẢ VÀO SQL SERVER
    async function submitQuiz() {
        clearInterval(countdownTimer);

        let totalScore = 0;
        let userScore = 0;
        let correctCount = 0;

        currentQuestions.forEach((qData, qIdx) => {
            const questionPoint = parseFloat(qData.point || 2);
            totalScore += questionPoint;
            
            const selectedOpt = document.querySelector(`input[name="question-${qIdx}"]:checked`);
            if (selectedOpt) {
                const answerIndex = parseInt(selectedOpt.value);
                const correctAnswer = qData.answer !== undefined ? qData.answer : qData.correct_answer;
                
                if (answerIndex === parseInt(correctAnswer)) {
                    userScore += questionPoint;
                    correctCount++;
                }
            }
        });

        const finalScore10 = parseFloat(((userScore / totalScore) * 10).toFixed(1));

        document.getElementById('result').innerHTML = `
            <div id="result-box">
                <h3>🎉 KẾT QUẢ BÀI LÀM</h3>
                <p>Số câu trả lời đúng: <strong>${correctCount} / ${currentQuestions.length}</strong> câu</p>
                <p>Điểm số đạt được: <strong style="color:#00d2ff; font-size:24px;">${finalScore10}</strong> / 10 điểm</p>
                <p style="font-size:14px; color:#aaa; margin-top:5px;">(Điểm gốc câu hỏi: ${userScore.toFixed(1)} / ${totalScore.toFixed(1)})</p>
                <button onclick="location.href='training.html'" class="btn-ok" style="margin-top:15px; padding:10px 20px; border-radius:8px; cursor:pointer; background:#ff00ea; color:#fff; border:none; font-weight:bold;">Hoàn tất</button>
            </div>
        `;

        document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        document.getElementById('btn-submit-quiz').disabled = true;

        const studentUser = JSON.parse(localStorage.getItem('user'));
        if (!studentUser) {
            alert("⚠️ Cảnh báo: Không tìm thấy phiên đăng nhập học sinh! Kết quả điểm thi không thể đồng bộ vào cơ sở dữ liệu.");
            return;
        }

        try {
            const res = await fetch(`${API_URL}/student/quiz/submit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: studentUser.id,
                    quiz_id: parseInt(quizIdFromUrl),
                    total_score: finalScore10
                })
            });
            const data = await res.json();
            if (data.status === "success") {
                console.log("✓ Hệ thống đã đồng bộ thành công kết quả điểm thi vào SQL Server!");
            } else {
                alert("❌ Lỗi đồng bộ điểm số: " + data.message);
            }
        } catch (err) {
            console.error("Lỗi kết nối API nộp bài:", err);
            alert("❌ Không thể kết nối với máy chủ để lưu điểm số thi!");
        }
    }

    // 6. ĐIỀU HƯỚNG VÀ MODAL XÁC NHẬN THOÁT THI
    function goBack() {
        document.getElementById('confirmModal').style.display = 'flex';
    }

    function closeConfirm() {
        document.getElementById('confirmModal').style.display = 'none';
    }

    function confirmExit() {
        window.location.href = 'training.html';
    }

    window.onload = loadQuizData;
</script>
</body>
</html>
