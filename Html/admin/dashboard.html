<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin | DHTA ACADEMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/CSS/admin.css">
</head>
<body>
    <aside class="sidebar">
        <h2>ADMIN</h2>
        <nav class="sidebar-nav" id="admin-nav">
            <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="courses.html"><i class="fas fa-book"></i> Khóa học</a>
            <a href="training.html"><i class="fas fa-code"></i> Luyện tập</a>
            <a href="events.html"><i class="fas fa-calendar-alt"></i> Sự kiện</a>
            <a href="vouchers.html"><i class="fas fa-ticket-alt"></i> Mã giảm giá</a>
            <a href="users.html"><i class="fas fa-users"></i> Khách hàng</a>
          <a href="/Html/admin/orders.html"><i class="fas fa-shopping-cart"></i> Đơn hàng</a>
            <div style="height: 1px; background: rgba(255,255,255,0.05); margin: 20px 0;"></div>
            <a href="../home/index.html"><i class="fas fa-home"></i> Trang chủ</a>
            <a href="javascript:void(0)" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="page-header"><h1 class="page-title">HỆ THỐNG QUẢN TRỊ</h1></header>
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px;">
            <div class="stat-card" style="background:var(--glass); padding:25px; border-radius:20px; border:1px solid var(--border); text-align:center;">
                <i class="fas fa-user-graduate" style="color:var(--cyan); font-size:30px;"></i>
                <h2 id="v-u" style="font-size:32px; margin:10px 0;">0</h2><p style="color:#888; font-size:12px;">HỌC VIÊN</p>
            </div>
            <div class="stat-card" style="background:var(--glass); padding:25px; border-radius:20px; border:1px solid var(--border); text-align:center;">
                <i class="fas fa-layer-group" style="color:var(--pink); font-size:30px;"></i>
                <h2 id="v-c" style="font-size:32px; margin:10px 0;">0</h2><p style="color:#888; font-size:12px;">KHÓA HỌC</p>
            </div>
            <div class="stat-card" style="background:var(--glass); padding:25px; border-radius:20px; border:1px solid var(--border); text-align:center;">
                <i class="fas fa-laptop-code" style="color:#2ecc71; font-size:30px;"></i>
                <h2 id="v-e" style="font-size:32px; margin:10px 0;">0</h2><p style="color:#888; font-size:12px;">BÀI TẬP</p>
            </div>
            <div class="stat-card" style="background:var(--glass); padding:25px; border-radius:20px; border:1px solid var(--border); text-align:center;">
                <i class="fas fa-wallet" style="color:#f1c40f; font-size:30px;"></i>
                <h2 id="v-r" style="font-size:32px; margin:10px 0;">0</h2><p style="color:#888; font-size:12px;">DOANH THU</p>
            </div>
        </div>
        <div class="table-container">
            <h3 style="margin-bottom:20px;">BIỂU ĐỒ TĂNG TRƯỞNG</h3>
            <div style="height: 350px;"><canvas id="revenueChart"></canvas></div>
        </div>
    </main>

    <script>
        const path = window.location.pathname;
        document.querySelectorAll('#admin-nav a').forEach(a => { if(path.includes(a.getAttribute('href'))) a.classList.add('active'); });

        async function loadDash() {
            const res = await fetch('http://127.0.0.1:5001/api/admin/dashboard');
            const d = await res.json();
            document.getElementById('v-u').innerText = d.users;
            document.getElementById('v-c').innerText = d.courses;
            document.getElementById('v-e').innerText = d.exams;
            document.getElementById('v-r').innerText = d.revenue.toLocaleString() + " đ";

            new Chart(document.getElementById('revenueChart'), {
                type: 'line',
                data: {
                    labels: ['T1','T2','T3','T4','T5','T6'],
                    datasets: [{ label: 'Triệu VNĐ', data: d.chart, borderColor: '#00f2ff', backgroundColor: 'rgba(0,242,255,0.1)', fill: true, tension: 0.4 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } } }
            });
        }
        function logout() { localStorage.removeItem("user"); location.href = "../account/login.html"; }
        window.onload = loadDash;
    </script>
</body>
</html>
