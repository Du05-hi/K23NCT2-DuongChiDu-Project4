<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sự kiện | DHTA ACADEMY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* TONE MÀU CHUẨN TỪ ẢNH TRANG CHỦ CỦA NHÓM 10 */
            --bg-body: #0b0118;
            --bg-gradient: linear-gradient(135deg, #1a0625 0%, #3d0b44 100%);
            --cyan: #00f2ff;
            --pink: #ff00ea;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg-gradient); 
            color: #fff; 
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            /* Lớp phủ sáng mờ ở phía trên cho giống trang chủ */
            background-attachment: fixed;
        }

        /* --- HEADER CHUẨN ĐỒNG BỘ HEADER CHUNG --- */
        header {
            background: rgba(11, 1, 24, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 22px; font-weight: 900; letter-spacing: 1px; color: #fff; text-decoration: none; }
        .logo span { color: var(--pink); }

        .nav-links { display: flex; gap: 25px; list-style: none; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 14px; font-weight: 600; opacity: 0.8; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--cyan); opacity: 1; }

        .header-right { display: flex; align-items: center; gap: 20px; }
        .user-greet { font-size: 14px; font-weight: 600; }
        .user-greet span { color: var(--pink); }
        .btn-logout { 
            border: 1px solid var(--pink); color: #fff; padding: 7px 18px; 
            border-radius: 12px; text-decoration: none; font-size: 13px; font-weight: 700;
        }

        /* --- HERO BANNER --- */
        .hero-banner {
            margin: 30px 8%;
            padding: 80px 60px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .hero-banner h1 { font-size: 55px; font-weight: 900; line-height: 1; margin-bottom: 25px; }
        .hero-banner h1 span { color: var(--cyan); text-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        
        .btn-action {
            background: #007bff; color: #fff; padding: 15px 35px;
            border-radius: 35px; border: none; font-weight: 800; cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 123, 255, 0.4);
        }

        /* --- CONTENT AREA --- */
        .main-container { padding: 40px 8%; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .section-header h2 { font-size: 32px; font-weight: 900; }

        .search-box { position: relative; width: 350px; }
        .search-box i { position: absolute; left: 20px; top: 14px; color: #888; }
        .search-box input {
            width: 100%; background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px 12px 55px; border-radius: 30px; color: #fff; outline: none;
        }

        /* --- EVENT CARDS --- */
        .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .event-card {
            background: rgba(255, 255, 255, 0.03); border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05); overflow: hidden; transition: 0.4s;
        }
        .event-card:hover { transform: translateY(-10px); border-color: var(--cyan); }
        
        .img-container { height: 200px; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .tag {
            position: absolute; bottom: 15px; left: 15px;
            background: linear-gradient(90deg, var(--cyan), var(--pink));
            padding: 5px 15px; border-radius: 12px; font-size: 11px; font-weight: 900;
        }

        .card-info { padding: 25px; }
        .date { color: var(--cyan); font-weight: 800; font-size: 13px; margin-bottom: 12px; display: block; }
        .title { font-size: 20px; font-weight: 800; margin-bottom: 15px; line-height: 1.3; }
        .footer { display: flex; justify-content: space-between; align-items: center; color: var(--cyan); font-weight: 800; font-size: 13px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">DHTA <span>ACADEMY</span></a>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="learning.html">Học tập</a></li>
                <li><a href="training.html">Luyện tập</a></li>
                <li><a href="order-history.html">Lịch sử</a></li>
                <li><a href="event.html" class="active">Sự kiện</a></li>
                <li><a href="about.html">Giới thiệu</a></li>
                <li><a href="coupon.html">Mã giảm giá</a></li>
            </ul>
        </nav>
        <div class="header-right">
            <i class="fas fa-shopping-cart" style="font-size: 18px;"></i>
            <div class="user-greet">Chào, <span>admin!</span></div>
            <a href="#" class="btn-logout">Đăng xuất</a>
        </div>
    </header>

    <section class="hero-banner">
        <h1>LẬP TRÌNH <br><span>2026</span></h1>
        <button class="btn-action">THAM GIA NGAY</button>
    </section>

    <div class="main-container">
        <div class="section-header">
            <h2>TẤT CẢ SỰ KIỆN</h2>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Tìm kiếm tên sự kiện...">
            </div>
        </div>

        <div class="event-grid" id="event-grid">
            </div>
    </div>

    <script>
        const API = "/api/admin/events";
        let events = [];

        async function load() {
            try {
                const res = await fetch(API);
                events = await res.json();
                render(events);
            } catch (e) {
                console.error("Lỗi API!");
            }
        }

        function render(data) {
            const grid = document.getElementById('event-grid');
            if(!data || data.length === 0) {
                grid.innerHTML = '<p style="padding: 20px;">Đang trống dữ liệu!</p>';
                return;
            }

            grid.innerHTML = data.map(ev => `
                <div class="event-card">
                    <div class="img-container">
                        <img src="https://source.unsplash.com/random/400x250/?tech,coding,${ev.id}" alt="">
                        <div class="tag">${ev.status}</div>
                    </div>
                    <div class="card-info">
                        <span class="date"><i class="far fa-calendar-alt"></i> ${new Date(ev.date).toLocaleDateString('vi-VN')}</span>
                        <h3 class="title">${ev.title}</h3>
                        <div class="footer">
                            <span>XEM CHI TIẾT</span>
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const kw = e.target.value.toLowerCase();
            const filtered = events.filter(ev => ev.title.toLowerCase().includes(kw));
            render(filtered);
        });

        window.onload = load;
    </script>
</body>
</html>
