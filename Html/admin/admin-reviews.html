<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đánh giá | Admin DHTA ACADEMY</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/CSS/admin.css">
    <link rel="stylesheet" href="/CSS/admin/admin-reviews.css">
</head>
<body>

<aside class="sidebar">
        <h2>ADMIN</h2>
        <nav class="sidebar-nav" id="admin-nav">
            <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="courses.html"><i class="fas fa-book"></i> Khóa học</a>
            <a href="training.html"><i class="fas fa-code"></i> Luyện tập</a>
            <a href="events.html"><i class="fas fa-calendar-alt"></i> Sự kiện</a>
            <a href="vouchers.html"><i class="fas fa-ticket-alt"></i> Mã giảm giá</a>
            <a href="users.html"><i class="fas fa-users"></i> Khách hàng</a>
            <a href="orders.html"><i class="fas fa-shopping-cart"></i> Đơn hàng</a>
            <a href="admin-reviews.html"><i class="fas fa-comment-dots"></i> Đánh giá</a>
            
            <div style="height: 1px; background: rgba(255,255,255,0.05); margin: 20px 0;"></div>
            <a href="../home/index.html"><i class="fas fa-home"></i> Trang chủ</a>
            <a href="javascript:void(0)" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
        </nav>
    </aside>
    <main class="main-content">
        <h1 class="page-title">Quản lý Đánh giá</h1>
        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th style="width: 70px;">ID</th>
                        <th style="width: 140px;">Học viên</th>
                        <th>Khóa học</th>
                        <th style="width: 130px;">Xếp hạng</th>
                        <th>Nội dung nhận xét</th>
                        <th style="width: 140px; text-align:center;">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="admin-reviews-list">
                    <tr><td colspan="6" style="text-align:center; color:#00d2ff; padding:30px;">Đang quét toàn bộ đánh giá từ hệ thống...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="reviewModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color:#00d2ff; margin-bottom:25px; font-weight:900; text-transform:uppercase;">Chi tiết nhận xét</h3>
            <div class="modal-body">
                <p><strong>Học viên:</strong> <b id="m-user" style="color:#fff;"></b></p>
                <p><strong>Khóa học:</strong> <span id="m-course"></span></p>
                <p><strong>Điểm số:</strong> <span id="m-stars" class="stars"></span></p>
                <p style="margin-top:15px;"><strong>Lời bình luận chi tiết:</strong></p>
                <div id="m-comment" style="background:rgba(0,0,0,0.4); padding:15px; border-radius:10px; border:1px solid rgba(255,255,255,0.05); font-size:14px; margin-top:5px; color:#fff; min-height:80px; white-space:pre-wrap;"></div>
            </div>
            <button onclick="closeModal()" style="width:100%; margin-top:25px; padding:12px; background:linear-gradient(90deg, #ff00cc, #ff4d6d); color:#fff; border:none; border-radius:10px; font-weight:800; cursor:pointer; transition:0.3s;">ĐÓNG CỬA SỔ</button>
        </div>
    </div>

    <script>
        /* LOGIC TỰ ĐỘNG THẮP SÁNG TAB SIDEBAR KHI TRANG HOẠT ĐỘNG */
        const path = window.location.pathname;
        document.querySelectorAll('#admin-nav a').forEach(a => { 
            const href = a.getAttribute('href');
            if(href && path.includes(href)) { a.classList.add('active'); }
        });

        const API = "http://127.0.0.1:5001/api/admin/reviews";
        let reviewsCache = [];

        // GỌI API ĐỔ DỮ LIỆU ĐÁNH GIÁ RA BẢNG
        async function fetchAdminReviews() {
            try {
                const res = await fetch(`${API}?t=${Date.now()}`);
                reviewsCache = await res.json();
                const tbody = document.getElementById('admin-reviews-list');
                
                if(reviewsCache.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#ccc;">Chưa có học viên nào gửi đánh giá.</td></tr>`;
                    return;
                }

                tbody.innerHTML = reviewsCache.map(r => `
                    <tr>
                        <td style="color:#00d2ff; font-weight:800;">#${r.id}</td>
                        <td style="font-weight:600; color:#fff;">${r.username}</td>
                        <td style="color:#ccc;">${r.course_title}</td>
                        <td><span class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span></td>
                        <td><div class="comment-preview" onclick="showDetail(${r.id})">${r.comment || '<i>Không để lại lời bình.</i>'}</div></td>
                        <td style="text-align:center;">
                            <button class="btn-action btn-view" onclick="showDetail(${r.id})"><i class="fas fa-eye"></i></button>
                            <button class="btn-action btn-delete" onclick="delReview(${r.id})"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                document.getElementById('admin-reviews-list').innerHTML = `<tr><td colspan="6" style="text-align:center; color:#ff4d6d; font-weight:bold;">❌ Lỗi kết nối API Backend Server!</td></tr>`;
            }
        }

        // BẬT POPUP XEM CHI TIẾT
        function showDetail(id) {
            const r = reviewsCache.find(item => item.id === id);
            if(!r) return;
            document.getElementById('m-user').innerText = r.username;
            document.getElementById('m-course').innerText = r.course_title;
            document.getElementById('m-stars').innerText = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
            document.getElementById('m-comment').innerText = r.comment || "Học viên chỉ chấm sao, không để lại lời bình luận.";
            document.getElementById('reviewModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('reviewModal').style.display = 'none'; }

        // GỌI API XÓA ĐÁNH GIÁ
        async function delReview(id) {
            if(confirm(`M có chắc chắn muốn xóa vĩnh viễn đánh giá #${id} này không?`)) {
                const res = await fetch(`${API}/delete/${id}`, { method: 'DELETE' });
                if(res.ok) {
                    fetchAdminReviews();
                }
            }
        }

        function logout() { localStorage.removeItem('user'); location.href = '../account/login.html'; }
        window.onload = fetchAdminReviews;
    </script>
</body>
</html>
