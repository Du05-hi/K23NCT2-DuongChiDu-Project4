<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ Hàng | DHTA ACADEMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #07070f;
            --card: #0c0c16;
            --cyan: #00d2ff;
            --pink: #ff00ea;
            --border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; padding: 60px 20px; }
        .container { max-width: 1100px; margin: 0 auto; }

        /* Title chuẩn ảnh */
        .page-title { border-left: 5px solid var(--pink); padding-left: 20px; margin-bottom: 40px; }
        .page-title h1 { font-size: 32px; font-weight: 800; text-transform: uppercase; }
        .page-title p { color: #666; font-size: 14px; margin-top: 5px; }

        .layout { display: grid; grid-template-columns: 1.7fr 1fr; gap: 30px; align-items: start; }

        /* Item Khóa học */
        .item-list { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        .item { display: flex; align-items: center; padding: 25px; border-bottom: 1px solid var(--border); }
        .item:last-child { border-bottom: none; }
        
        .item-icon { 
            width: 70px; height: 70px; background: rgba(0, 210, 255, 0.1); 
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            color: var(--cyan); font-size: 28px; margin-right: 20px;
        }

        .item-info { flex: 1; }
        .item-info h3 { font-size: 18px; font-weight: 700; margin-bottom: 5px; }
        .item-info p { color: #555; font-size: 13px; }

        .item-price { font-weight: 800; color: var(--pink); font-size: 20px; margin: 0 30px; }

        .btn-del { color: #333; cursor: pointer; transition: 0.3s; background: none; border: none; font-size: 18px; }
        .btn-del:hover { color: #ff4d6d; }

        /* Hóa đơn */
        .summary { background: var(--card); border-radius: 20px; padding: 35px; border: 1px solid var(--border); }
        .summary h2 { font-size: 20px; margin-bottom: 25px; color: var(--cyan); text-transform: uppercase; }
        .row { display: flex; justify-content: space-between; margin-bottom: 15px; color: #888; }
        .total { border-top: 2px solid #1a1a2e; margin-top: 25px; padding-top: 25px; font-weight: 900; font-size: 26px; }

        /* Nút bấm chuẩn Gradient */
        .btn-main {
            width: 100%; padding: 18px; border: none; border-radius: 15px; margin-top: 30px;
            background: linear-gradient(90deg, var(--cyan), var(--pink));
            color: #fff; font-weight: 800; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2); transition: 0.3s;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 0, 234, 0.4); }

        .btn-outline {
            width: 100%; padding: 15px; border: 1px solid var(--cyan); border-radius: 15px; margin-top: 15px;
            background: transparent; color: var(--cyan); font-weight: 700; cursor: pointer;
            text-transform: uppercase; display: block; text-align: center; text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-title">
            <h1>GIỎ HÀNG</h1>
            <p>Kiểm tra các khóa học trước khi thanh toán</p>
        </div>
        <div class="layout" id="cart-content"></div>
    </div>

    <script>
        function render() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const container = document.getElementById('cart-content');
            if (cart.length === 0) {
                container.innerHTML = `<div style="grid-column:span 2; text-align:center; padding:100px; color:#444;">Giỏ hàng trống.</div>`;
                return;
            }
            let total = 0;
            const items = cart.map((i, idx) => {
                total += parseInt(i.price);
                return `<div class="item">
                    <div class="item-icon"><i class="fas fa-play-circle"></i></div>
                    <div class="item-info"><h3>${i.title}</h3><p>Premium Access • DHTA Academy</p></div>
                    <div class="item-price">${parseInt(i.price).toLocaleString()} đ</div>
                    <button class="btn-del" onclick="del(${idx})"><i class="fas fa-times"></i></button>
                </div>`;
            }).join('');

            container.innerHTML = `<div class="item-list">${items}</div>
            <div class="summary">
                <h2>TÓM TẮT ĐƠN HÀNG</h2>
                <div class="row"><span>Số lượng</span><span>${cart.length}</span></div>
                <div class="row"><span>Tạm tính</span><span>${total.toLocaleString()} đ</span></div>
                <div class="row total"><span>Tổng tiền</span><span style="color:var(--cyan)">${total.toLocaleString()} đ</span></div>
                <button class="btn-main" onclick="location.href='checkout.html'">THANH TOÁN NGAY</button>
                <a href="learning.html" class="btn-outline">TIẾP TỤC MUA HÀNG</a>
            </div>`;
        }
        function del(idx) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(idx, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            render();
        }
        window.onload = render;
    </script>
</body>
</html>
