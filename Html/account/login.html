<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>

    <link rel="stylesheet" href="../../CSS/main.css">
    <link rel="stylesheet" href="../../CSS/login.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="auth-page">

    <div class="login-card">
        <h2>Đăng nhập</h2>

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="Tên tài khoản">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Mật khẩu">
        </div>

        <button class="btn-login" onclick="handleLogin()">Đăng nhập</button>

        <div class="social-login">
            <p>Hoặc tiếp tục với</p>
            <div class="social-icons">
                <div class="icon" title="Google"><i class="fab fa-google"></i></div>
                <div class="icon" title="Facebook"><i class="fab fa-facebook-f"></i></div>
                <div class="icon" title="GitHub"><i class="fab fa-github"></i></div>
            </div>
        </div>

        <p class="switch">
            Chưa có tài khoản?
            <a href="register.html">Đăng ký</a>
        </p>
    </div>
    
    <a href="../home/index.html" class="back-home">
        <i class="fas fa-arrow-left"></i>
    </a>

</div>

<script>
    async function handleLogin() {
        // 1. Lấy dữ liệu người dùng gõ vào ô input
        const userVal = document.getElementById('username').value;
        const passVal = document.getElementById('password').value;

        // 2. Kiểm tra xem có để trống không
        if (!userVal || !passVal) {
            alert("Vui lòng nhập đầy đủ tài khoản và mật khẩu!");
            return;
        }

        try {
            // 3. Gọi Fetch API gửi dữ liệu lên Backend (Cổng 5001)
            const response = await fetch('http://127.0.0.1:5001/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: userVal,
                    password: passVal
                })
            });

            // 4. Nhận kết quả từ Backend trả về
            const data = await response.json();

            if (data.status === "success") {
                alert(data.message); // Báo đăng nhập thành công
                
                // Lưu thông tin user vào bộ nhớ trình duyệt để các trang khác nhận diện
                localStorage.setItem('user', JSON.stringify(data.user));
                
                // ==================== LOGIC PHÂN QUYỀN ĐIỀU HƯỚNG TỰ ĐỘNG MỚI CẬP NHẬT ====================
                const userRole = data.user.role ? data.user.role.toLowerCase() : "student";

                if (userRole === "admin") {
                    // Nếu role là ADMIN -> Chuyển hướng vào trang quản trị tối cao
                    window.location.href = "../admin/dashboard.html";
                } else if (userRole === "instructor") {
                    // Nếu role là GIÁO VIÊN -> Chuyển hướng vào trang quản trị chuyên môn giáo viên
                    window.location.href = "../instructor/dashboard.html";
                } else {
                    // Nếu là HỌC SINH/MẶC ĐỊNH -> Đẩy về giao diện học viên bình thường
                    window.location.href = "../home/index.html";
                }
                // =========================================================================================
                
            } else {
                // Báo lỗi: Sai mật khẩu hoặc tài khoản không tồn tại
                alert("Lỗi: " + data.message); 
            }

        } catch (error) {
            console.error("Lỗi Fetch:", error);
            alert("❌ Lỗi kết nối! Hãy chắc chắn bạn đã bật máy chủ bằng lệnh 'python app.py'!");
        }
    }
</script>

</body>
</html>
